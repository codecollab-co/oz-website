name: Bug report
description: Something on the website is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a website bug. Please fill in the fields below — it makes triage much faster.

        For **security issues**, do NOT open an issue. See [SECURITY.md](https://github.com/codecollab-co/oz/blob/main/SECURITY.md).

  - type: input
    id: page-url
    attributes:
      label: Affected page URL
      description: The URL or path of the page where the issue occurs.
      placeholder: "https://codecollab-co.github.io/oz-website/docs/features/editor/"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Mobile Browser
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug (e.g., broken links, formatting issues, layout shifts, loading errors).
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list of steps to trigger the bug.
      placeholder: |
        1. Go to URL ...
        2. Click on link ...
        3. Observe layout shift
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Console logs
      description: Paste any screenshots or DevTools console errors that help explain the issue.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
